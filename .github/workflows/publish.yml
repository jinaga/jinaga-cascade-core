name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: When true, runs npm publish --dry-run (no upload). Ignored for tag pushes.
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1
      - run: npm ci
      - name: Verify tag matches package.json
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
            exit 1
          fi
      - run: npm run build
      - name: Publish to npm (release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: npm publish --access public
      - name: Dry-run publish (manual)
        if: github.event_name == 'workflow_dispatch' && fromJSON(inputs.dry_run)
        run: npm publish --dry-run --access public
      - name: Publish to npm (manual, not dry-run)
        if: github.event_name == 'workflow_dispatch' && !fromJSON(inputs.dry_run)
        run: npm publish --access public
